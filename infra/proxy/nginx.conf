# =========================================================
# PROXY PRINCIPAL DE LONDON TRAVEL
# =========================================================

server {
    listen 80;
    server_name _;

    client_max_body_size 100M;

    # DNS interno de Docker.
    # Permite que el proxy continúe funcionando aunque
    # un servicio secundario esté temporalmente apagado.
    resolver 127.0.0.11 ipv6=off valid=10s;

    # =====================================================
    # ENDPOINT DE SALUD DEL PROXY
    # =====================================================
    location = /salud {
        access_log off;
        default_type text/plain;
        add_header Cache-Control "no-store";

        return 200 "proxy-saludable\n";
    }

    # =====================================================
    # API REST DE DJANGO
    # =====================================================
    location /api/ {
        set $servicio_backend http://backend:8000;

        proxy_pass $servicio_backend;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        proxy_intercept_errors on;
        error_page 502 503 504 = @backend_no_disponible;
    }

    # =====================================================
    # ADMINISTRACIÓN DE DJANGO
    # =====================================================
    location /admin/ {
        set $servicio_backend http://backend:8000;

        proxy_pass $servicio_backend;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
    }

    # =====================================================
    # ARCHIVOS ESTÁTICOS DE DJANGO
    # =====================================================
    location /static/ {
        alias /var/www/static/;

        expires 7d;
        access_log off;
    }

    # =====================================================
    # ARCHIVOS MULTIMEDIA Y FOTOGRAFÍAS 360°
    # =====================================================
    location /media/ {
        alias /var/www/media/;

        expires 1d;
        access_log off;
    }

    # =====================================================
    # MÓDULO INMERSIVO INDEPENDIENTE
    # =====================================================
    location = /inmersivo {
        return 301 /inmersivo/;
    }

    # =====================================================
    # MÓDULO INMERSIVO INDEPENDIENTE
    # =====================================================
    location /inmersivo/ {
        set $servicio_inmersivo http://frontend-inmersivo:80;

        # Conserva la dirección /inmersivo/
        proxy_pass $servicio_inmersivo;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 3s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        proxy_intercept_errors on;
        error_page 502 503 504 = /fallback-inmersivo.html;
    }

    # =====================================================
    # RESPALDO CUANDO DJANGO NO ESTÁ DISPONIBLE
    # =====================================================
    location @backend_no_disponible {
        default_type application/json;
        add_header Cache-Control "no-store";

        return 503 '{"detalle":"El servicio de información dinámica no se encuentra disponible temporalmente."}';
    }

    # =====================================================
    # PÁGINA DE RESPALDO DEL MÓDULO 360°
    # =====================================================
    location = /fallback-inmersivo.html {
        root /usr/share/nginx/fallback;
        internal;
    }

    # =====================================================
    # CSS Y JAVASCRIPT DEL RESPALDO 360°
    # =====================================================
    location /respaldo360/ {
        alias /usr/share/nginx/fallback/;

        access_log off;
        add_header Cache-Control "no-store";
    }

    # =====================================================
    # PÁGINA INFORMATIVA PRINCIPAL
    # =====================================================
    location / {
        set $servicio_informativo http://frontend-informativo:80;

        proxy_pass $servicio_informativo;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
    }
}