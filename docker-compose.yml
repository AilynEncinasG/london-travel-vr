name: london-travel-vr

services:
  # =========================================================
  # BASE DE DATOS
  # =========================================================
  db:
    image: mysql:8.4
    container_name: london_travel_db
    restart: unless-stopped

    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}

    ports:
      - "${MYSQL_PORT}:3306"

    volumes:
      - mysql_data:/var/lib/mysql

    networks:
      - red_datos

    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-uroot",
          "-p${MYSQL_ROOT_PASSWORD}"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s


  # =========================================================
  # BACKEND DJANGO Y API REST
  # =========================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: london_travel_backend
    restart: unless-stopped

    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_DEBUG: ${DJANGO_DEBUG}
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,backend,proxy

      DB_NAME: ${MYSQL_DATABASE}
      DB_USER: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      DB_HOST: db
      DB_PORT: 3306

    command: >
      sh -c "
      python manage.py migrate --noinput &&
      python manage.py collectstatic --noinput &&
      gunicorn config.wsgi:application
      --bind 0.0.0.0:8000
      --workers 3
      --timeout 60
      "

    depends_on:
      db:
        condition: service_healthy

    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles

    expose:
      - "8000"

    networks:
      - red_aplicacion
      - red_datos

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/salud/', timeout=3)\" || exit 1"
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s


  # =========================================================
  # PÁGINA INFORMATIVA PRINCIPAL
  # =========================================================
  frontend-informativo:
    build:
      context: ./frontend-informativo
      dockerfile: Dockerfile

    container_name: london_travel_informativo
    restart: unless-stopped

    expose:
      - "80"

    networks:
      - red_aplicacion

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O /dev/null http://127.0.0.1/salud || exit 1"
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s


  # =========================================================
  # MÓDULO INMERSIVO 360°
  # =========================================================
  frontend-inmersivo:
    build:
      context: ./frontend-inmersivo
      dockerfile: Dockerfile

    container_name: london_travel_inmersivo
    restart: unless-stopped

    expose:
      - "80"

    networks:
      - red_aplicacion

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O /dev/null http://127.0.0.1/salud || exit 1"
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s


  # =========================================================
  # PROXY PRINCIPAL NGINX
  # =========================================================
  proxy:
    image: nginx:1.27-alpine
    container_name: london_travel_proxy
    restart: unless-stopped

    ports:
      - "8080:80"

    depends_on:
      frontend-informativo:
        condition: service_healthy

    volumes:
      - ./infra/proxy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./infra/proxy/fallback:/usr/share/nginx/fallback:ro
      - media_data:/var/www/media:ro
      - static_data:/var/www/static:ro

    networks:
      - red_aplicacion

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q --spider http://localhost/salud || exit 1"
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s


# =========================================================
# REDES INTERNAS
# =========================================================
networks:
  red_aplicacion:
    name: london_travel_aplicacion

  red_datos:
    name: london_travel_datos


# =========================================================
# VOLÚMENES PERSISTENTES
# =========================================================
volumes:
  mysql_data:
    name: london_travel_mysql

  media_data:
    name: london_travel_media

  static_data:
    name: london_travel_static